<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h2>Student Dashboard</h2>

<label>Filter by Department:</label>
<select id="filterDept" onchange="displayData()">
    <option value="All">All</option>
    <option value="CSE">CSE</option>
    <option value="ECE">ECE</option>
    <option value="EEE">EEE</option>
</select>

<label>Sort by:</label>
<select id="sortOption" onchange="displayData()">
    <option value="none">None</option>
    <option value="name">Name</option>
    <option value="date">Admission Date</option>
</select>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Admission Date</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<h3>Student Count Per Department</h3>
<div id="countSection"></div>

<script>

// Sample data (normally comes from SQL database)
let students = [
    {id:1, name:"Arun", department:"CSE", date:"2024-01-10"},
    {id:2, name:"Divya", department:"ECE", date:"2024-02-15"},
    {id:3, name:"Karthik", department:"CSE", date:"2024-03-12"},
    {id:4, name:"Meena", department:"EEE", date:"2024-01-25"},
    {id:5, name:"Rahul", department:"ECE", date:"2024-02-20"}
];

function displayData() {
    let dept = document.getElementById("filterDept").value;
    let sort = document.getElementById("sortOption").value;

    let filtered = students;

    // Filter
    if (dept !== "All") {
        filtered = filtered.filter(s => s.department === dept);
    }

    // Sort
    if (sort === "name") {
        filtered.sort((a,b) => a.name.localeCompare(b.name));
    }
    if (sort === "date") {
        filtered.sort((a,b) => new Date(a.date) - new Date(b.date));
    }

    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    filtered.forEach(s => {
        table.innerHTML += `
            <tr>
                <td>${s.id}</td>
                <td>${s.name}</td>
                <td>${s.department}</td>
                <td>${s.date}</td>
            </tr>
        `;
    });

    countStudents();
}

function countStudents() {
    let counts = {};

    students.forEach(s => {
        counts[s.department] = (counts[s.department] || 0) + 1;
    });

    let output = "";
    for (let dept in counts) {
        output += dept + " : " + counts[dept] + "<br>";
    }

    document.getElementById("countSection").innerHTML = output;
}

displayData();

</script>

</body>
</html>
